<div>

  <!-- Loading state while role is being fetched -->
  <div *ngIf="!roleLoaded" class="editor-layout">
    <p style="padding: 2rem; color: var(--muted)">Loading…</p>
  </div>

  <!-- Unauthorized -->
  <div *ngIf="roleLoaded && !roles.includes(myRole)" class="editor-layout">
    You do not have permission to access this project.
  </div>

  <!-- Authorized -->
  <div *ngIf="roleLoaded && roles.includes(myRole)" class="editor-layout" [class.sidebar-open]="sidebarOpen">
    <div class="sidebar-backdrop" *ngIf="sidebarOpen" (click)="sidebarOpen = false"></div>

    <aside class="sidebar">
      <!-- Auto-save status -->
      <div class="autosave-status" *ngIf="autoSaveState$ | async as state">
        <span *ngIf="state.saving" class="status-saving">Saving…</span>
        <span *ngIf="!state.saving && state.lastSaved" class="status-saved">
          Saved {{ state.lastSaved | date:'HH:mm' }}
        </span>
        <span *ngIf="!state.saving && !state.lastSaved && state.enabled" class="status-pending">
          Auto-save on
        </span>
        <span *ngIf="!state.enabled" class="status-off">Auto-save off</span>
      </div>

      <app-branch-panel
        [projectId]="projectId"
        [scriptId]="scriptId"
        [canEdit]="canEdit"
        [commitMessage]="commitMessage"
        (commitMessageChange)="commitMessage = $event"
        (saveSnapshot)="saveSnapshot()"
        (branchSelected)="onBranchSelected($event)"
        (compareDrafts)="openDiff($event.from, $event.to)"
      >
      </app-branch-panel>
    </aside>

    <main class="editor-main">

      <header class="editor-header">
        <button class="sidebar-toggle" (click)="sidebarOpen = !sidebarOpen" aria-label="Toggle drafts panel">☰</button>

        <span class="branch-pill" *ngIf="activeBranch">{{ activeBranch.name }}</span>
        <span class="branch-pill empty" *ngIf="!activeBranch">no branch</span>

        <!-- Viewers see a read-only badge instead -->
        <span class="role-badge" *ngIf="!canEdit">View only</span>
      </header>

      <div class="element-toolbar">
        <div class="el-btns">
          <button *ngFor="let el of elements"
                class="el-btn"
                [attr.data-element]="el"
                [class.active]="el === activeElement"
                (click)="setElement(el)">
          {{ elementLabels[el] }}
        </button>
        </div>

        <span class="kbd-hint">Tab to cycle &nbsp;·&nbsp; ⌘1–0 to set</span>
      </div>

      <!-- Only the menu bar itself is attached to the page below it —
           same width, sitting directly on top of it, rather than
           stretching full-width like the header/toolbar above. -->
      <div class="page-chrome">
        <nav class="menu-bar">
          <app-menu-dropdown label="File">
            <button (click)="saveSnapshot()" [disabled]="!activeBranch || !canEdit">Save draft</button>
            <div class="menu-divider"></div>
            <button (click)="insertTitlePage()" [disabled]="!canEdit">Insert title page…</button>
            <div class="menu-divider"></div>
            <button (click)="importFountain()" [disabled]="!canEdit">Import Fountain…</button>
            <button (click)="exportFountain()">Export as Fountain…</button>
            <button (click)="exportPDF()" disabled>Export as PDF…</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Edit">
            <button (click)="undo()">Undo</button>
            <button (click)="redo()">Redo</button>
            <div class="menu-divider"></div>
            <button (click)="openFindReplace()" disabled>Find &amp; Replace…</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Format">
            <button *ngFor="let el of elements" (click)="setElement(el)">
              {{ elementLabels[el] }}
            </button>
          </app-menu-dropdown>

          <app-menu-dropdown label="View">
            <button (click)="toggleToolbar()">
              {{ showToolbar ? 'Hide' : 'Show' }} format toolbar
            </button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Share">
            <button (click)="goToCollaborators()" *ngIf="isOwner">Manage collaborators…</button>
            <button disabled *ngIf="!isOwner">View only access</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Revisions">
            <button (click)="scrollToHistory()">View history</button>
            <button (click)="createBranchPrompt()">New branch…</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Tools">
            <button (click)="toggleAutoSave()">
              {{ (autoSaveState$ | async)?.enabled ? 'Disable' : 'Enable' }} auto-save
            </button>
            <div class="menu-divider"></div>
            <button (click)="setAutoSaveInterval(1)">Auto-save every 1 min</button>
            <button (click)="setAutoSaveInterval(2)">Auto-save every 2 mins</button>
            <button (click)="setAutoSaveInterval(5)">Auto-save every 5 mins</button>
            <button (click)="setAutoSaveInterval(10)">Auto-save every 10 mins</button>

            <button disabled>Word count</button>
            <button disabled>Script statistics</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Reports">
            <button disabled>Scene list</button>
            <button disabled>Character list</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Production">
            <button disabled>Scene breakdown</button>
          </app-menu-dropdown>

          <app-menu-dropdown label="Help">
            <button (click)="openShortcuts()">Keyboard shortcuts</button>
          </app-menu-dropdown>
        </nav>
      </div>

      <div #prosemirrorMount class="pm-mount">

      </div>
    </main>

    <div class="diff-backdrop" *ngIf="showDiff" (click)="showDiff = false"></div>

    <app-diff-viewer
      *ngIf="showDiff"
      [fromId]="diffFromId"
      [toId]="diffToId"
      (close)="showDiff = false">
    </app-diff-viewer>

</div>
