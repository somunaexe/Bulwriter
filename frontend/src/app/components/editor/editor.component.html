<div class="editor-layout">

  <aside class="sidebar">
    <app-branch-panel
      [projectId]="projectId"
      (branchSelected)="onBranchSelected($event)"
      (compareDrafts)="openDiff($event.from, $event.to)">
    </app-branch-panel>
  </aside>

  <main class="editor-main">

    <header class="editor-header">
      <span class="branch-pill" *ngIf="activeBranch">{{ activeBranch.name }}</span>
      <span class="branch-pill empty" *ngIf="!activeBranch">no branch</span>

      <div class="commit-bar">
        <input [(ngModel)]="commitMessage"
               placeholder="Describe this draft…"
               class="commit-input"
               (keydown.enter)="saveSnapshot()" />
        <button class="btn-save"
                (click)="saveSnapshot()"
                [disabled]="!activeBranch || !commitMessage.trim()">
          Save draft
        </button>
      </div>
    </header>

    <div class="element-toolbar">
      <button *ngFor="let el of elements"
              class="el-btn"
              [attr.data-element]="el"
              (click)="setElement(el)">
        {{ elementLabels[el] }}
      </button>
      <span class="kbd-hint">Tab to cycle &nbsp;·&nbsp; ⌘1–6 to set</span>
    </div>

    <div class="element-indicator-wrap">
      <div #elementIndicator class="element-indicator"></div>
    </div>

    <div #prosemirrorMount class="pm-mount"></div>

  </main>

  <app-diff-viewer
    *ngIf="showDiff"
    [fromId]="diffFromId"
    [toId]="diffToId"
    (close)="showDiff = false">
  </app-diff-viewer>

</div>
