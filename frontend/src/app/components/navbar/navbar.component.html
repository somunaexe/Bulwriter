<nav class="navbar">

  <!-- Left: Brand -->
  <button class="brand" (click)="openProjects()">Bulwriter</button>

  <!-- Middle: main nav -->
  <div class="nav-links" [class.open]="menuOpen">
    <a routerLink="/" (click)="openProjects()">Projects</a>
  </div>

  <!-- Right: account -->
  <div class="auth">
    <ng-container *ngIf="signedIn$ | async; else signedOut">
      <div class="account" *ngIf="user$ | async as user">
        <button class="account-btn" (click)="toggleAccount()" [class.open]="accountOpen">
          <span class="avatar" *ngIf="!user.imageUrl">{{ initials(user.name) }}</span>
          <img class="avatar" *ngIf="user.imageUrl" [src]="user.imageUrl" [alt]="user.name" />
          <span class="account-name">{{ user.name }}</span>
          <span class="chevron">▾</span>
        </button>

        <div class="dropdown-menu" *ngIf="accountOpen">
          <div class="dropdown-header">
            <span class="dropdown-name">{{ user.name }}</span>
            <span class="dropdown-email" *ngIf="user.email">{{ user.email }}</span>
          </div>
          <div class="menu-divider"></div>
          <button (click)="openAccount()">Account settings</button>
          <button (click)="toggleAbout()">About Bulwriter</button>
          <div class="menu-divider"></div>
          <button class="signout" (click)="signOut()">Sign out</button>
        </div>
      </div>
    </ng-container>

    <ng-template #signedOut>
      <button class="signout" routerLink="/sign-in">Sign in</button>
    </ng-template>

    <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
      ☰
    </button>
  </div>
</nav>

<!-- About panel -->
<div class="about-overlay" *ngIf="aboutOpen" (click)="toggleAbout()">
  <div class="about-panel" (click)="$event.stopPropagation()">
    <h2>Bulwriter</h2>
    <p>Collaborative screenwriting with Git-style version control and real-time co-writing.</p>
    <p class="about-meta">Industry-standard Fountain import/export, branch-based drafts, and live collaboration.</p>
    <button class="btn-ghost" (click)="toggleAbout()">Close</button>
  </div>
</div>
