<div class="dashboard">

  <header class="dash-header">
    <h1 class="logo">Bulwriter</h1>
    <p class="tagline">Your screenwriting workspace</p>
  </header>

  <!-- Only editors and owners can create scripts -->
  <section class="new-project" *ngIf="canEdit">
    <input
      [(ngModel)]="newTitle"
      placeholder="New script title…"
      class="input-lg"
      (keydown.enter)="createScript()" />
    <button class="btn-save" (click)="createScript()" [disabled]="!newTitle.trim()">
      Create script
    </button>
  </section>

  <section class="project-list">

    <p class="loading-msg" *ngIf="loading">Loading…</p>
    <p class="error-msg" *ngIf="error">{{ error }}</p>

    <p class="empty-msg" *ngIf="!loading && !error && scripts.length === 0">
      No scripts yet. Create one above.
    </p>

    <div class="project-card"
         *ngFor="let s of scripts"
         (click)="openScript(s.id)">
      <div class="project-card-title">{{ s.title }}</div>
      <div class="project-card-meta">{{ s.createdAt | date:'mediumDate' }}</div>
    </div>

  </section>

  <section class="collaborators">
    <h2 class="section-label">Collaborators</h2>

    <ul class="member-list">
      <li *ngFor="let m of members" class="member-item">
        <span class="member-id">{{ m.userId }}</span>
        <span class="member-role">{{ m.role }}</span>
      </li>
    </ul>

    <ul class="invite-list" *ngIf="invites.length > 0">
      <li *ngFor="let inv of invites" class="invite-item">
        <span class="invite-email">{{ inv.email }}</span>
        <span class="invite-status" [class.pending]="inv.status === 'pending'">{{ inv.status }}</span>
      </li>
    </ul>

    <!-- Only owners can invite -->
    <div class="invite-form" *ngIf="isOwner">
      <input
        [(ngModel)]="inviteEmail"
        placeholder="Invite by email…"
        class="input-sm"
        (keydown.enter)="sendInvite()" />
      <button class="btn-ghost" (click)="sendInvite()" [disabled]="!inviteEmail.trim()">
        Invite
      </button>
    </div>

    <p class="error-msg" *ngIf="inviteError">{{ inviteError }}</p>
  </section>
</div>
