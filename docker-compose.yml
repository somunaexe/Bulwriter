services:
  db:
    image: postgres:16
    container_name: bulwriter-db
    environment:
      POSTGRES_USER: bulwriter
      POSTGRES_PASSWORD: Bulwriter6742
      POSTGRES_DB: bulwriter
    ports:
      - "5432:5432"
    volumes:
      # This persists your database data even if the container is removed.
      # Without this, all data is lost when the container stops.
      - bulwriter_db_data:/var/lib/postgresql/data
    healthcheck:
      # The backend won't start until Postgres is actually ready to
      # accept connections — not just started, but fully initialised.
      test: ["CMD-SHELL", "pg_isready -U bulwriter -d bulwriter"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bulwriter-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bulwriter:Bulwriter6742@db:5432/bulwriter?sslmode=disable
    depends_on:
      db:
        condition: service_healthy  # waits for the healthcheck above to pass

volumes:
  bulwriter_db_data: